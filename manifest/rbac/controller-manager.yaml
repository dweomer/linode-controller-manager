---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: controller-manager
  namespace: linode-system
rules:
- apiGroups:
  - ""
  resources:
  - events
  verbs:
  - create
  - patch
- apiGroups:
  - linode.com
  resources:
  - instances
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - linode.com
  resources:
  - instances/finalizers
  verbs:
  - update
- apiGroups:
  - linode.com
  resources:
  - instances/status
  verbs:
  - get
  - patch
  - update
